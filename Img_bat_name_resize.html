<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puti-AI 圖片批次命名與瘦身工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- JSZip & FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .drag-item { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .drag-item.dragging { opacity: 0.5; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: scale(1.02); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    
    <!-- 內嵌 小吉獨立 Web Component 模組 (gigi-mascot) -->
    <script>
        class GiGiMascot extends HTMLElement {
            constructor() {
                super();
                const shadow = this.attachShadow({ mode: 'open' });
                shadow.innerHTML = `
                    <style>
                        .gigi-container {
                            width: 7rem;
                            height: 7rem;
                            margin-left: auto;
                            margin-right: auto;
                            margin-bottom: 0.5rem;
                            position: relative;
                            cursor: pointer;
                            filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.04)) drop-shadow(0 4px 3px rgba(0, 0, 0, 0.1));
                        }

                        /* 漂浮動畫 */
                        @keyframes float-bot { 
                            0%, 100% { transform: translateY(0px); } 
                            50% { transform: translateY(-8px); } 
                        }
                        .animate-float { 
                            animation: float-bot 3s ease-in-out infinite; 
                        }
                        
                        /* 眼睛間歇發亮動畫 */
                        @keyframes intermittent-glow {
                            0%, 80%, 100% { opacity: 0.8; filter: brightness(1); }
                            88% { opacity: 1; filter: brightness(1.4) drop-shadow(0 0 5px #22d3ee); }
                            92% { opacity: 1; filter: brightness(1.8) drop-shadow(0 0 8px #67e8f9); }
                            96% { opacity: 1; filter: brightness(1.4) drop-shadow(0 0 5px #22d3ee); }
                        }
                        .animate-eye-glow { animation: intermittent-glow 4s ease-in-out infinite; }

                        /* 眼睛反光閃爍 */
                        @keyframes sparkle-eye { 
                            0%, 100% { opacity: 1; transform: scale(1); } 
                            50% { opacity: 0.7; transform: scale(1.1); } 
                        }
                        .animate-sparkle { animation: sparkle-eye 2s ease-in-out infinite; }
                        .animate-sparkle-delay { animation: sparkle-eye 2s ease-in-out infinite; animation-delay: 0.5s; }

                        /* 螢幕跑馬燈與眼睛隱藏循環動畫 (4秒眼睛 + 6秒文字 = 總長 10 秒) */
                        @keyframes eye-visibility {
                            0%, 40% { opacity: 1; visibility: visible; }
                            41%, 95% { opacity: 0; visibility: hidden; }
                            96%, 100% { opacity: 1; visibility: visible; }
                        }
                        .animate-eyes-toggle { animation: eye-visibility 10s infinite; }

                        /* 跑馬燈捲動 */
                        @keyframes marquee-scroll {
                            0%, 40% { opacity: 0; transform: translateX(0px); }
                            41% { opacity: 1; transform: translateX(0px); }
                            95% { opacity: 1; transform: translateX(-100px); }
                            96%, 100% { opacity: 0; transform: translateX(-100px); }
                        }
                        .animate-marquee-text { animation: marquee-scroll 10s linear infinite; }
                    </style>

                    <div class="gigi-container animate-float" title="我是小吉！有什麼可以為您服務的嗎？">
                        <svg viewBox="0 0 100 100" style="width: 100%; height: 100%;" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <clipPath id="screenClip">
                                    <rect x="25" y="41" width="50" height="26" rx="10" />
                                </clipPath>
                            </defs>

                            <!-- 左耳/右耳 -->
                            <path d="M 15 40 C 7 40 7 60 15 60 Z" fill="#94a3b8" />
                            <path d="M 15 44 C 10 44 10 56 15 56 Z" fill="#06b6d4" />
                            <path d="M 85 40 C 93 40 93 60 85 60 Z" fill="#94a3b8" />
                            <path d="M 85 44 C 90 44 90 56 85 56 Z" fill="#06b6d4" />

                            <!-- 主頭部 -->
                            <rect x="15" y="25" width="70" height="50" rx="25" fill="#f59e0b" />
                            <rect x="17" y="27" width="66" height="46" rx="23" fill="#fbbf24" />

                            <!-- Puti-AI 文字 -->
                            <text x="50" y="37" font-size="6.5" fill="#78350f" text-anchor="middle" font-weight="900" style="font-family: sans-serif;">Puti-AI</text>

                            <!-- 黑色面罩區域 -->
                            <rect x="25" y="41" width="50" height="26" rx="10" fill="#0f172a" />
                            
                            <!-- 電路板裝飾 -->
                            <path d="M 28 47 L 31 47 L 31 43 M 72 58 L 69 58 L 69 54" stroke="#1e293b" stroke-width="1" fill="none" />

                            <!-- 眼睛群組 -->
                            <g class="animate-eyes-toggle">
                                <circle cx="36" cy="54" r="8" fill="#0891b2" />
                                <circle cx="36" cy="54" r="6" fill="#22d3ee" class="animate-eye-glow" />
                                <circle cx="64" cy="54" r="8" fill="#0891b2" />
                                <circle cx="64" cy="54" r="6" fill="#22d3ee" class="animate-eye-glow" />

                                <g class="animate-sparkle" style="transform-origin: 36px 54px;">
                                    <circle cx="33" cy="51" r="2.5" fill="#ffffff" />
                                    <circle cx="38" cy="56" r="1" fill="#ffffff" />
                                </g>
                                <g class="animate-sparkle-delay" style="transform-origin: 64px 54px;">
                                    <circle cx="61" cy="51" r="2.5" fill="#ffffff" />
                                    <circle cx="66" cy="56" r="1" fill="#ffffff" />
                                </g>
                            </g>

                            <!-- 跑馬燈文字 -->
                            <g clip-path="url(#screenClip)">
                                <text 
                                    x="78" y="58" 
                                    font-size="7" 
                                    fill="#22d3ee" 
                                    font-weight="bold" 
                                    font-family="sans-serif, Microsoft JhengHei" 
                                    class="animate-marquee-text"
                                    style="filter: drop-shadow(0 0 2px #22d3ee);"
                                >
                                    我是小吉，歡迎光臨
                                </text>
                            </g>

                            <path d="M 46 71 Q 50 73 54 71" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </div>
                `;
            }
        }
        customElements.define('gigi-mascot', GiGiMascot);
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback, useEffect } = React;

        function App() {
            const [images, setImages] = useState([]);
            const [prefix, setPrefix] = useState('Image_');
            const [startNum, setStartNum] = useState(1);
            const [padding, setPadding] = useState(3);
            
            const [outputFormat, setOutputFormat] = useState('image/jpeg'); // 新增：輸出格式狀態 (預設轉為JPG)
            const [enableResize, setEnableResize] = useState(false);
            const [resizeMode, setResizeMode] = useState('width');
            const [maxWidth, setMaxWidth] = useState(1920);
            const [maxHeight, setMaxHeight] = useState(1080);
            const [quality, setQuality] = useState(0.8);
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState({ current: 0, total: 0 });
            
            const [draggedIndex, setDraggedIndex] = useState(null);
            const fileInputRef = useRef(null);

            // 處理檔案上傳
            const handleFiles = (files) => {
                const newImages = Array.from(files)
                    .filter(file => file.type.startsWith('image/'))
                    .map(file => ({
                        id: Math.random().toString(36).substr(2, 9),
                        file: file,
                        preview: URL.createObjectURL(file),
                        originalName: file.name,
                        ext: file.name.split('.').pop()
                    }));
                setImages(prev => [...prev, ...newImages]);
            };

            const onFileChange = (e) => {
                if (e.target.files.length > 0) {
                    handleFiles(e.target.files);
                }
            };

            // 拖曳上傳區的事件
            const handleDragOverZone = (e) => { e.preventDefault(); };
            const handleDropZone = (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files);
                }
            };

            // 列表項目拖曳排序邏輯
            const onDragStart = (index) => setDraggedIndex(index);
            const onDragEnter = (index) => {
                if (draggedIndex === null || draggedIndex === index) return;
                const newItems = [...images];
                const item = newItems[draggedIndex];
                newItems.splice(draggedIndex, 1);
                newItems.splice(index, 0, item);
                setDraggedIndex(index);
                setImages(newItems);
            };
            const onDragEnd = () => setDraggedIndex(null);

            const removeImage = (idToRemove) => {
                setImages(images.filter(img => img.id !== idToRemove));
            };

            const clearAll = () => {
                setImages([]);
            };

            // 圖片處理 (Canvas) 邏輯 - 整合縮放與格式轉換
            const processImageCanvas = (file, doResize, targetW, targetH, mode, quality, targetFormat) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = URL.createObjectURL(file);
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (doResize) {
                            if (mode === 'width') {
                                const ratio = targetW / width;
                                width = Math.round(width * ratio);
                                height = Math.round(height * ratio);
                            } else if (mode === 'height') {
                                const ratio = targetH / height;
                                width = Math.round(width * ratio);
                                height = Math.round(height * ratio);
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        const finalMimeType = targetFormat === 'original' ? file.type : targetFormat;

                        // 處理透明度，避免黑底 (轉成 JPEG 時背景補白)
                        if (finalMimeType === 'image/jpeg') {
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, width, height);
                        }
                        
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            URL.revokeObjectURL(img.src);
                            resolve(blob);
                        }, finalMimeType, quality);
                    };
                    img.onerror = () => {
                        resolve(file); // 發生錯誤時回傳原檔
                    }
                });
            };

            // 處理並打包 ZIP
            const processAndDownload = async () => {
                if (images.length === 0) return;
                
                setIsProcessing(true);
                setProgress({ current: 0, total: images.length });
                const zip = new JSZip();

                for (let i = 0; i < images.length; i++) {
                    const item = images[i];
                    
                    // 決定副檔名
                    let finalExt = item.ext.toLowerCase();
                    if (outputFormat !== 'original') {
                        finalExt = outputFormat.split('/')[1];
                        if (finalExt === 'jpeg') finalExt = 'jpg';
                    }

                    const numStr = String(startNum + i).padStart(padding, '0');
                    const newName = `${prefix}${numStr}.${finalExt}`;

                    let fileData = item.file;

                    // 若開啟瘦身，或有改變輸出格式，則進入 Canvas 重新渲染
                    if (enableResize || outputFormat !== 'original') {
                        fileData = await processImageCanvas(item.file, enableResize, maxWidth, maxHeight, resizeMode, quality, outputFormat);
                    }

                    zip.file(newName, fileData);
                    setProgress({ current: i + 1, total: images.length });
                }

                setProgress({ current: '打包中...', total: images.length });
                
                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, `Puti-AI_Images_${new Date().getTime()}.zip`);
                
                setIsProcessing(false);
                setProgress({ current: 0, total: 0 });
            };

            const UploadIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-gray-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
            );
            
            const TrashIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            );

            const GripIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-400 cursor-grab active:cursor-grabbing" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8h16M4 16h16" />
                </svg>
            );

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    
                    {/* Header */}
                    <div className="max-w-5xl w-full mb-8 text-center pt-2">
                        {/* 這裡直接召喚 Web Component 小吉 */}
                        <gigi-mascot></gigi-mascot>
                        <h1 className="text-3xl font-bold text-gray-800 mb-2">Puti-AI 圖片批次命名與瘦身工具</h1>
                        <p className="text-gray-600">輕鬆排序、調整大小，一鍵為您的圖片換上整齊的新名字！</p>
                    </div>

                    <div className="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* Left Column: Settings */}
                        <div className="lg:col-span-1 space-y-6">
                            
                            {/* Naming Settings */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h2 className="text-xl font-semibold text-gray-800 mb-4 border-b pb-2">命名設定</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">前綴字 (Prefix)</label>
                                        <input type="text" value={prefix} onChange={e => setPrefix(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" 
                                            placeholder="例如: 照片_" />
                                    </div>
                                    
                                    <div className="flex gap-4">
                                        <div className="w-1/2">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">起始數字</label>
                                            <input type="number" min="0" value={startNum} onChange={e => setStartNum(parseInt(e.target.value) || 0)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div className="w-1/2">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">流水號位數</label>
                                            <input type="number" min="1" max="10" value={padding} onChange={e => setPadding(parseInt(e.target.value) || 1)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                    </div>

                                    <div className="bg-blue-50 p-3 rounded-lg text-sm text-blue-800">
                                        預覽範例: <span className="font-mono font-bold">{prefix}{String(startNum).padStart(padding, '0')}.jpg</span>
                                    </div>
                                </div>
                            </div>

                            {/* Resize Settings */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h2 className="text-xl font-semibold text-gray-800 mb-4 border-b pb-2">輸出與瘦身設定</h2>
                                
                                <div className="space-y-5">
                                    {/* 輸出格式選擇 */}
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">統一輸出格式</label>
                                        <select 
                                            value={outputFormat} 
                                            onChange={e => setOutputFormat(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                                        >
                                            <option value="original">保持來源原格式</option>
                                            <option value="image/jpeg">全部轉為 JPG (推薦！檔案最小)</option>
                                            <option value="image/png">全部轉為 PNG (保留透明背景，檔案較大)</option>
                                            <option value="image/webp">全部轉為 WEBP (網頁最佳化格式)</option>
                                        </select>
                                    </div>

                                    {/* 瘦身開關 */}
                                    <div className="flex items-center justify-between pt-2 border-t border-gray-100">
                                        <div>
                                            <h3 className="font-medium text-gray-800">開啟尺寸瘦身</h3>
                                            <p className="text-xs text-gray-500">限制圖片最大寬高尺寸</p>
                                        </div>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={enableResize} onChange={() => setEnableResize(!enableResize)} />
                                            <div className="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                                        </label>
                                    </div>

                                    {enableResize && (
                                        <div className="space-y-4 animate-fade-in bg-blue-50/50 p-4 rounded-lg">
                                            <p className="text-xs text-gray-500">選擇要固定的邊長，另一邊將自動等比例縮放以防變形。</p>
                                            
                                            <div className="flex gap-4 mb-2">
                                                <label className="inline-flex items-center cursor-pointer">
                                                    <input type="radio" className="w-4 h-4 text-blue-600 focus:ring-blue-500 cursor-pointer" value="width" checked={resizeMode === 'width'} onChange={() => setResizeMode('width')} />
                                                    <span className="ml-2 text-sm text-gray-700 font-medium">統一寬度</span>
                                                </label>
                                                <label className="inline-flex items-center cursor-pointer">
                                                    <input type="radio" className="w-4 h-4 text-blue-600 focus:ring-blue-500 cursor-pointer" value="height" checked={resizeMode === 'height'} onChange={() => setResizeMode('height')} />
                                                    <span className="ml-2 text-sm text-gray-700 font-medium">統一高度</span>
                                                </label>
                                            </div>

                                            <div className="flex gap-4">
                                                <div className="w-1/2 transition-opacity" style={{ opacity: resizeMode === 'width' ? 1 : 0.4 }}>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">目標寬度 (px)</label>
                                                    <input type="number" value={maxWidth} onChange={e => setMaxWidth(parseInt(e.target.value) || 100)} disabled={resizeMode !== 'width'}
                                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-gray-100 disabled:cursor-not-allowed" />
                                                </div>
                                                <div className="w-1/2 transition-opacity" style={{ opacity: resizeMode === 'height' ? 1 : 0.4 }}>
                                                    <label className="block text-sm font-medium text-gray-700 mb-1">目標高度 (px)</label>
                                                    <input type="number" value={maxHeight} onChange={e => setMaxHeight(parseInt(e.target.value) || 100)} disabled={resizeMode !== 'height'}
                                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-gray-100 disabled:cursor-not-allowed" />
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-end mb-1">
                                                    <label className="block text-sm font-medium text-gray-700">畫質設定</label>
                                                    <span className="text-xs font-bold text-blue-600">{Math.round(quality * 100)}%</span>
                                                </div>
                                                <input type="range" min="0.1" max="1" step="0.1" value={quality} onChange={e => setQuality(parseFloat(e.target.value))}
                                                    className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                                <p className="text-[10px] text-gray-400 mt-1">*畫質設定僅對 JPG 或 WEBP 格式有效</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                        </div>

                        {/* Right Column: Upload & List */}
                        <div className="lg:col-span-2 space-y-6">
                            
                            {/* Upload Zone */}
                            <div 
                                className="border-2 border-dashed border-gray-300 rounded-xl p-8 flex flex-col items-center justify-center bg-white hover:bg-gray-50 transition-colors cursor-pointer"
                                onClick={() => fileInputRef.current.click()}
                                onDragOver={handleDragOverZone}
                                onDrop={handleDropZone}
                            >
                                <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={onFileChange} />
                                <UploadIcon />
                                <p className="text-gray-600 font-medium">點擊或拖曳圖片至此處上傳</p>
                                <p className="text-sm text-gray-400 mt-1">支援 JPG, PNG, WEBP, GIF 等格式</p>
                            </div>

                            {/* Image List */}
                            {images.length > 0 && (
                                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                                    <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                        <h3 className="font-semibold text-gray-700">已選擇 {images.length} 張圖片 <span className="text-sm font-normal text-gray-500 ml-2">(可拖曳上下排序)</span></h3>
                                        <button onClick={clearAll} className="text-sm text-red-500 hover:text-red-700 font-medium">清空全部</button>
                                    </div>
                                    
                                    <div className="max-h-[500px] overflow-y-auto p-2 custom-scrollbar">
                                        <div className="space-y-2">
                                            {images.map((item, index) => {
                                                const isDragging = draggedIndex === index;
                                                const numStr = String(startNum + index).padStart(padding, '0');
                                                const newName = `${prefix}${numStr}.${item.ext}`;

                                                return (
                                                    <div 
                                                        key={item.id}
                                                        draggable
                                                        onDragStart={() => onDragStart(index)}
                                                        onDragEnter={() => onDragEnter(index)}
                                                        onDragEnd={onDragEnd}
                                                        className={`drag-item flex items-center p-3 bg-white border border-gray-200 rounded-lg ${isDragging ? 'dragging' : 'hover:border-blue-300'}`}
                                                    >
                                                        <div className="mr-3">
                                                            <GripIcon />
                                                        </div>
                                                        <div className="w-16 h-16 flex-shrink-0 bg-gray-100 rounded overflow-hidden mr-4 border border-gray-200">
                                                            <img src={item.preview} alt="preview" className="w-full h-full object-cover" />
                                                        </div>
                                                        <div className="flex-grow min-w-0">
                                                            <div className="flex items-baseline space-x-2">
                                                                <span className="text-xs text-gray-400">新檔名:</span>
                                                                <span className="font-bold text-blue-700 truncate">{newName}</span>
                                                            </div>
                                                            <div className="flex items-baseline space-x-2 mt-1">
                                                                <span className="text-xs text-gray-400">原檔名:</span>
                                                                <span className="text-sm text-gray-500 truncate">{item.originalName}</span>
                                                            </div>
                                                        </div>
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); removeImage(item.id); }}
                                                            className="ml-4 p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors"
                                                            title="移除此圖片"
                                                        >
                                                            <TrashIcon />
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    
                                    {/* Action Bottom Bar */}
                                    <div className="p-4 bg-gray-50 border-t flex flex-col sm:flex-row justify-between items-center gap-4">
                                        <div className="text-sm text-gray-600 w-full sm:w-1/2">
                                            {isProcessing && (
                                                <div className="flex items-center space-x-2">
                                                    <svg className="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                    </svg>
                                                    <span>處理中: {progress.current} / {progress.total}</span>
                                                </div>
                                            )}
                                        </div>
                                        <button 
                                            onClick={processAndDownload}
                                            disabled={isProcessing}
                                            className={`w-full sm:w-auto px-6 py-3 rounded-lg font-bold text-white shadow-md transition-all 
                                                ${isProcessing ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 hover:shadow-lg active:transform active:scale-95'}`}
                                        >
                                            {isProcessing ? '打包處理中...' : '開始處理並下載 Zip'}
                                        </button>
                                    </div>
                                </div>
                            )}

                            {images.length === 0 && (
                                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center text-gray-400">
                                    尚無上傳圖片，請先上傳圖片以預覽結果。
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="mt-16 w-full text-center text-sm text-gray-500 py-6 border-t border-gray-200">
                        <p>
                            屏東縣後庄國小黃朝榮老師作品，免費分享，歡迎擴散推廣，嚴禁商用與任何侵權、不尊重著作權的行為，
                            <a href="https://padlet.com/clongwh/puti_ai_tools" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 hover:underline font-medium ml-1">
                                更多 Puti-AI 教學工具 點此前往
                            </a>
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
