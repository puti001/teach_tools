<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puti-AI 直式除法產生器 (完美排版/全卷下載版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');
        body {
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: #f0f4f8; 
        }
        .puti-header {
            background-color: #1A237E; 
            color: #00FFFF; 
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
        }
        .puti-btn {
            background-color: #D4AF37; 
            color: #1A237E;
            transition: all 0.2s ease;
        }
        .puti-btn:hover {
            background-color: #bfa030;
            transform: translateY(-2px);
        }
        canvas {
            background-color: #ffffff;
            border-radius: 8px;
            max-width: 100%;
            height: auto;
        }
        input[type=range] {
            accent-color: #D4AF37;
        }
        
        @media print {
            body { background-color: #ffffff; }
            .no-print { display: none !important; }
            #resultsArea { 
                display: grid !important; 
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 20px !important; 
            }
            .card-container { 
                box-shadow: none !important; 
                border: 1px solid #cbd5e1 !important; 
                break-inside: avoid; 
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <!-- 主控台 -->
    <div class="no-print w-full max-w-5xl bg-white rounded-2xl shadow-xl overflow-hidden mb-8 border-2 border-[#1A237E]/10">
        <div class="puti-header p-6 relative flex flex-col md:flex-row justify-between items-center">
            <div class="md:w-1/4"></div> 
            <div class="text-center md:w-2/4">
                <h1 class="text-3xl font-bold tracking-wider">Puti-AI 直式除法產生器</h1>
                <p class="text-sm mt-2 text-cyan-100/80">GiGi 數位助手 - 自動出題與全卷匯出</p>
            </div>
            <div class="mt-4 md:mt-0 md:w-1/4 text-right pr-4 flex flex-col gap-2">
                <button onclick="downloadAllImages()" class="bg-[#D4AF37] text-[#1A237E] font-bold py-2 px-4 rounded-lg shadow hover:bg-[#bfa030] transition flex items-center justify-center gap-2 ml-auto w-full md:w-auto">
                    <span>📥</span> 下載全卷圖片 (現況儲存)
                </button>
                <button onclick="window.print()" class="bg-white text-[#1A237E] font-bold py-2 px-4 rounded-lg shadow border border-gray-200 hover:bg-gray-100 transition flex items-center justify-center gap-2 ml-auto text-sm w-full md:w-auto">
                    <span>🖨️</span> 列印(限獨立視窗)
                </button>
            </div>
        </div>
        
        <div class="p-6">
            <div class="bg-blue-50 border border-blue-100 p-5 rounded-xl mb-6 flex flex-wrap gap-4 items-end justify-between shadow-sm">
                <div class="flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-sm text-[#1A237E] font-bold mb-1">出題數量</label>
                        <input type="number" id="genCount" value="10" min="1" max="50" class="w-20 px-3 py-2 rounded-lg border border-gray-300 focus:border-[#D4AF37] focus:outline-none text-center font-bold">
                    </div>
                    <div>
                        <label class="block text-sm text-[#1A237E] font-bold mb-1">被除數 (m位數)</label>
                        <input type="number" id="genM" value="3" min="1" max="6" class="w-24 px-3 py-2 rounded-lg border border-gray-300 focus:border-[#D4AF37] focus:outline-none text-center font-bold">
                    </div>
                    <div>
                        <label class="block text-sm text-[#1A237E] font-bold mb-1">除數 (n位數)</label>
                        <input type="number" id="genN" value="1" min="1" max="4" class="w-24 px-3 py-2 rounded-lg border border-gray-300 focus:border-[#D4AF37] focus:outline-none text-center font-bold">
                    </div>
                    <div>
                        <label class="block text-sm text-[#1A237E] font-bold mb-1">整除條件</label>
                        <select id="genDivisible" class="px-3 py-2 rounded-lg border border-gray-300 focus:border-[#D4AF37] focus:outline-none bg-white font-bold text-gray-700">
                            <option value="any">隨機 (皆可)</option>
                            <option value="yes" selected>✅ 必須整除</option>
                            <option value="no">❌ 必須有餘數</option>
                        </select>
                    </div>
                </div>
                <button onclick="generateQuestions()" class="bg-[#1A237E] text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-blue-800 transition whitespace-nowrap">
                    🎲 幫我出題
                </button>
            </div>

            <label class="block text-gray-700 font-bold mb-2">或手動貼上題庫 (不必刻意刪除題號或等號，GiGi 會自動過濾！)</label>
            <div class="flex flex-col md:flex-row gap-4">
                <textarea id="mathInput" rows="5" class="flex-1 px-4 py-3 text-lg border-2 border-gray-200 rounded-lg focus:outline-none focus:border-[#D4AF37] tracking-widest leading-relaxed resize-y" placeholder="例如：&#10;1. 120 / 5 = &#10;第2題：1234 ÷ 12&#10;(3) 104 / 5="></textarea>
                <div class="flex flex-col justify-end gap-2">
                    <button onclick="processBatchInput()" class="puti-btn font-bold py-4 px-8 rounded-lg shadow-md h-full md:h-auto whitespace-nowrap text-lg">
                        🚀 一鍵生成直式
                    </button>
                </div>
            </div>
            <div id="errorMsg" class="text-red-500 font-bold mt-2 hidden"></div>
        </div>
    </div>

    <!-- 畫布結果區 (雙欄排版) -->
    <div id="resultsArea" class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8 mb-10"></div>

    <!-- 版權宣告區 -->
    <div class="no-print mt-auto text-center text-gray-500 text-xs sm:text-sm px-4">
        <p>屏東縣後庄國小黃朝榮老師作品，免費分享，歡迎擴散推廣，</p>
        <p>嚴禁商用與任何侵權、不尊重著作權的行為，</p>
        <p>更多 Puti-AI 教學工具 <a href="https://padlet.com/clongwh/puti_ai_tools" target="_blank" class="text-blue-500 hover:underline font-bold">點此前往</a></p>
    </div>

<script>
    const cellW = 35; 
    const cellH = 45; 
    const startX = 60; 
    const startY = 70; 

    function generateQuestions() {
        let count = parseInt(document.getElementById('genCount').value) || 10;
        let m = parseInt(document.getElementById('genM').value) || 3;
        let n = parseInt(document.getElementById('genN').value) || 1;
        let divRule = document.getElementById('genDivisible').value;

        if (m < n) {
            alert("GiGi 提醒：被除數的位數不能小於除數喔！");
            return;
        }

        let generated = [];
        for (let i = 0; i < count; i++) {
            let dMin = Math.pow(10, n - 1);
            let dMax = Math.pow(10, n) - 1;
            if (n === 1) dMin = 2; 
            
            let d = Math.floor(Math.random() * (dMax - dMin + 1)) + dMin;
            let DMin = Math.pow(10, m - 1);
            let DMax = Math.pow(10, m) - 1;
            
            let D;
            if (divRule === 'yes') { 
                let qMin = Math.ceil(DMin / d);
                let qMax = Math.floor(DMax / d);
                if (qMin > qMax) {
                    D = d * qMin; 
                } else {
                    let q = Math.floor(Math.random() * (qMax - qMin + 1)) + qMin;
                    D = d * q;
                }
            } else if (divRule === 'no') { 
                do {
                    D = Math.floor(Math.random() * (DMax - DMin + 1)) + DMin;
                } while (D % d === 0);
            } else { 
                D = Math.floor(Math.random() * (DMax - DMin + 1)) + DMin;
            }
            generated.push(`${D} ÷ ${d}`);
        }
        
        document.getElementById('mathInput').value = generated.join('\n');
        processBatchInput();
    }

    function processBatchInput() {
        const inputLines = document.getElementById("mathInput").value.split('\n');
        const resultsArea = document.getElementById("resultsArea");
        const errorMsg = document.getElementById("errorMsg");
        
        resultsArea.innerHTML = ''; 
        errorMsg.classList.add('hidden');
        
        let validCount = 0;
        let hasDivisorDecimalError = false;

        inputLines.forEach((line) => {
            let trimLine = line.trim();
            if (!trimLine) return;

            let mathMatch = trimLine.match(/(\d+(?:\.\d+)?)\s*[/÷]\s*(\d+(?:\.\d+)?)/);
            
            if (mathMatch) {
                let dividendStr = mathMatch[1];
                let divisorStr = mathMatch[2];

                if (divisorStr.includes('.')) {
                    hasDivisorDecimalError = true;
                } else {
                    let divisor = parseInt(divisorStr, 10);
                    if (divisor > 0) {
                        validCount++;
                        createDivisionCard(dividendStr, divisor, validCount);
                    }
                }
            }
        });

        if (hasDivisorDecimalError) {
            errorMsg.innerHTML = "GiGi 報告：目前支援「被除數」有小數點，<strong>除數請先保持整數喔！</strong>";
            errorMsg.classList.remove('hidden');
        } else if (validCount === 0) {
            errorMsg.innerHTML = "Oops！沒有找到正確格式的題目喔，請檢查一下。";
            errorMsg.classList.remove('hidden');
        }
    }

    function calculateDivisionData(DStr, divisor) {
        let renderData = { maxOrder: 0, chars: [], lines: [], dots: [], symOrder: 0, len_d: divisor.toString().length, len_D: 0 };
        
        let digits = DStr.replace('.', '').split('');
        let original_len_D = digits.length; 
        
        let has_dot = DStr.includes('.');
        let ones_index = has_dot ? DStr.indexOf('.') - 1 : digits.length - 1;
        let dot_col_offset = has_dot ? DStr.indexOf('.') - 0.5 : -1;
        
        let order = 0; 
        renderData.symOrder = order;

        let divisorStr = divisor.toString();
        for(let k=0; k<divisorStr.length; k++) {
            renderData.chars.push({ char: divisorStr[k], row: 1, col: renderData.len_d - 1 - (divisorStr.length - 1 - k), order: order });
        }

        for(let k=0; k<digits.length; k++) {
            renderData.chars.push({ char: digits[k], row: 1, col: renderData.len_d + 1 + k, order: order });
        }

        if (has_dot) {
            let dc = renderData.len_d + 1 + dot_col_offset;
            renderData.dots.push({ row: 1, col: dc, order: order });
            renderData.dots.push({ row: 0, col: dc, order: order });
        }

        let cur_row = 2;
        let rem = 0;
        let started = false;
        let max_added_zeros = 6; 
        let added_zeros = 0;
        let i = 0;

        while (i < digits.length || rem > 0) {
            if (i >= digits.length) {
                if (added_zeros >= max_added_zeros) break; 
                
                if (!has_dot) {
                    has_dot = true;
                    dot_col_offset = i - 0.5;
                    let dc = renderData.len_d + 1 + dot_col_offset;
                    order++; 
                    renderData.dots.push({ row: 1, col: dc, order: order }); 
                    renderData.dots.push({ row: 0, col: dc, order: order }); 
                }
                
                digits.push('0');
                added_zeros++;
                
                order++;
                renderData.chars.push({ char: '0', row: 1, col: renderData.len_d + 1 + i, order: order, color: '#9ca3af' }); 
            }

            let digit = digits[i];
            let absCol = renderData.len_d + 1 + i;
            let val = rem * 10 + parseInt(digit, 10);

            if (!started) {
                if (val >= divisor || i >= ones_index) {
                    started = true;
                    let q = Math.floor(val / divisor);
                    
                    order++; 
                    renderData.chars.push({ char: q.toString(), row: 0, col: absCol, order: order });

                    if (q > 0) {
                        let prod = q * divisor;
                        order++; 
                        let prodStr = prod.toString();
                        for(let k=0; k<prodStr.length; k++) {
                            renderData.chars.push({ char: prodStr[k], row: cur_row, col: absCol - (prodStr.length - 1 - k), order: order });
                        }

                        order++; 
                        let lineLen = Math.max(val.toString().length, prodStr.length);
                        let startCol = absCol - lineLen + 1;
                        let endCol = Math.max(absCol, renderData.len_d + original_len_D);
                        renderData.lines.push({ row: cur_row, startCol: startCol, endCol: endCol, order: order });

                        cur_row++;
                        rem = val - prod;
                        
                        if (rem > 0 || i === digits.length - 1) {
                            order++; 
                            let remStr = rem.toString();
                            for(let k=0; k<remStr.length; k++) {
                                 renderData.chars.push({ char: remStr[k], row: cur_row, col: absCol - (remStr.length - 1 - k), order: order });
                            }
                        }
                    } else {
                        rem = val;
                        if (i === digits.length - 1) {
                            order++;
                            let remStr = rem.toString();
                            for(let k=0; k<remStr.length; k++) {
                                 renderData.chars.push({ char: remStr[k], row: cur_row, col: absCol - (remStr.length - 1 - k), order: order });
                            }
                        }
                    }
                } else { 
                    rem = val; 
                }
            } else {
                order++; 
                let charColor = (i >= digits.length - added_zeros) ? '#9ca3af' : '#2d3748';
                renderData.chars.push({ char: digit, row: cur_row, col: absCol, order: order, color: charColor });
                
                let q = Math.floor(val / divisor);
                order++; 
                renderData.chars.push({ char: q.toString(), row: 0, col: absCol, order: order });

                if (q > 0) {
                    let prod = q * divisor;
                    order++; 
                    let prodStr = prod.toString();
                    for(let k=0; k<prodStr.length; k++) {
                        renderData.chars.push({ char: prodStr[k], row: cur_row + 1, col: absCol - (prodStr.length - 1 - k), order: order });
                    }

                    order++; 
                    let lineLen = Math.max(val.toString().length, prodStr.length);
                    let startCol = absCol - lineLen + 1;
                    let endCol = Math.max(absCol, renderData.len_d + original_len_D); 
                    renderData.lines.push({ row: cur_row + 1, startCol: startCol, endCol: endCol, order: order });

                    cur_row += 2;
                    rem = val - prod;
                    
                    if (rem > 0 || i === digits.length - 1) {
                        order++; 
                        let remStr = rem.toString();
                        for(let k=0; k<remStr.length; k++) {
                             renderData.chars.push({ char: remStr[k], row: cur_row, col: absCol - (remStr.length - 1 - k), order: order });
                        }
                    }
                } else { 
                    rem = val; 
                }
            }
            i++;
        }
        
        renderData.maxOrder = order;
        renderData.finalRow = cur_row;
        renderData.len_D = digits.length; 
        return renderData;
    }

    function createDivisionCard(DStr, divisor, idNum) {
        const resultsArea = document.getElementById("resultsArea");
        
        let renderData = calculateDivisionData(DStr, divisor);
        renderData.qText = `Q${idNum}:  ${DStr} ÷ ${divisor}`; 

        let canvasWidth = startX * 2 + (renderData.len_d + renderData.len_D + 1) * cellW;
        let canvasHeight = startY * 2 + (renderData.finalRow + 1) * cellH;

        const card = document.createElement('div');
        card.className = "card-container bg-white p-4 rounded-xl shadow-lg flex flex-col items-center relative transition hover:shadow-xl w-full";
        
        const canvas = document.createElement('canvas');
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        card.appendChild(canvas);

        const controlDiv = document.createElement('div');
        controlDiv.className = "no-print w-full mt-4 bg-gray-50 p-3 rounded-lg border border-gray-100 flex flex-col gap-2";
        
        const sliderLabel = document.createElement('div');
        sliderLabel.className = "text-xs text-gray-500 font-bold flex justify-between";
        // 🚀 GiGi 修改：預設文字改為「題目」
        sliderLabel.innerHTML = `<span>分步演示</span><span class="step-text text-[#D4AF37]">題目</span>`;
        
        const slider = document.createElement('input');
        slider.type = "range";
        slider.min = "0";
        slider.max = renderData.maxOrder;
        // 🚀 GiGi 修改：預設為 0 (只顯示題目)
        slider.value = "0";
        slider.className = "w-full cursor-pointer";

        const downloadBtn = document.createElement('button');
        downloadBtn.className = "mt-2 bg-gray-200 text-gray-700 hover:bg-[#D4AF37] hover:text-[#1A237E] font-bold py-1 px-3 rounded text-sm transition";
        downloadBtn.innerText = "📥 儲存單題圖片";
        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `直式_Q${idNum}_${DStr}除以${divisor}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        controlDiv.appendChild(sliderLabel);
        controlDiv.appendChild(slider);
        controlDiv.appendChild(downloadBtn);
        card.appendChild(controlDiv);
        resultsArea.appendChild(card);

        const ctx = canvas.getContext('2d');
        const draw = () => drawCanvasContext(ctx, canvas, parseInt(slider.value, 10), renderData);
        
        slider.oninput = () => {
            let val = parseInt(slider.value, 10);
            let span = sliderLabel.querySelector('.step-text');
            if (val === 0) span.innerText = "題目";
            else if (val === renderData.maxOrder) span.innerText = "完成";
            else span.innerText = `步 ${val}`;
            draw();
        };

        // 初始繪製，將根據 slider.value = 0 渲染
        draw();
    }

    function drawCanvasContext(ctx, canvas, currentOrder, renderData) {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#1A237E"; 
        ctx.font = "bold 18px 'Nunito', 'Microsoft JhengHei', sans-serif"; 
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(renderData.qText, 15, 15);

        ctx.fillStyle = "rgba(0, 0, 0, 0.03)";
        ctx.font = "14px Arial";
        ctx.textAlign = "right";
        ctx.textBaseline = "bottom";
        ctx.fillText("©Puti-AI", canvas.width - 15, canvas.height - 15);
        ctx.fillText("©Puti-AI", 70, 40);

        ctx.font = "bold 28px 'Nunito', sans-serif"; 
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        renderData.chars.forEach(item => {
            if (item.order <= currentOrder) {
                let cx = startX + item.col * cellW + cellW/2;
                let cy = startY + item.row * cellH + cellH/2;
                ctx.fillStyle = item.color ? item.color : ((item.row === 0) ? "#D4AF37" : "#2d3748");
                ctx.fillText(item.char, cx, cy);
            }
        });

        renderData.dots.forEach(dot => {
            if (dot.order <= currentOrder) {
                let cx = startX + dot.col * cellW + cellW/2;
                let cy = startY + dot.row * cellH + cellH/2 + cellH/4; 
                ctx.fillStyle = (dot.row === 0) ? "#D4AF37" : "#2d3748";
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        ctx.strokeStyle = "#1A237E"; 
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";

        if (renderData.symOrder <= currentOrder) {
            let divLineX1 = startX + renderData.len_d * cellW + cellW * 0.15;
            let divLineX2 = startX + (renderData.len_d + renderData.len_D + 1) * cellW;
            let divLineY = startY + 1 * cellH;

            ctx.beginPath();
            ctx.moveTo(divLineX1, divLineY);
            ctx.lineTo(divLineX2, divLineY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(divLineX1, divLineY);
            ctx.quadraticCurveTo(divLineX1 + cellW * 0.25, divLineY + cellH * 0.5, divLineX1 - cellW * 0.2, divLineY + cellH);
            ctx.stroke();
        }

        renderData.lines.forEach(line => {
            if (line.order <= currentOrder) {
                let lx1 = startX + line.startCol * cellW + cellW * 0.1;
                let lx2 = startX + (line.endCol + 1) * cellW - cellW * 0.1;
                let ly = startY + (line.row + 1) * cellH; 

                ctx.beginPath();
                ctx.moveTo(lx1, ly);
                ctx.lineTo(lx2, ly);
                ctx.stroke();
            }
        });
    }

    function downloadAllImages() {
        const cards = document.querySelectorAll('.card-container');
        if (cards.length === 0) {
            alert("GiGi 提醒：請先出題或貼上題目，再下載喔！");
            return;
        }

        // 🚀 GiGi 修正：拔除了「下載前強制將所有拉桿拉到最滿」的邏輯
        // 現在直接使用畫布上的「現況」進行合併截圖

        const cols = 2;
        const padding = 50;
        const gap = 40;
        const headerHeight = 100;
        
        let maxW = 0;
        let canvases = [];
        cards.forEach(card => {
            let cvs = card.querySelector('canvas');
            if(cvs) {
                maxW = Math.max(maxW, cvs.width);
                canvases.push(cvs);
            }
        });

        const rows = Math.ceil(canvases.length / cols);
        let rowHeights = new Array(rows).fill(0);
        
        canvases.forEach((cvs, idx) => {
            let r = Math.floor(idx / cols);
            rowHeights[r] = Math.max(rowHeights[r], cvs.height);
        });

        let totalHeight = padding * 2 + headerHeight + gap * Math.max(0, rows - 1);
        rowHeights.forEach(h => totalHeight += h);
        
        let totalWidth = padding * 2 + maxW * 2 + gap;

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = totalWidth;
        finalCanvas.height = totalHeight;
        const ctx = finalCanvas.getContext('2d');

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, totalWidth, totalHeight);

        ctx.fillStyle = "#1A237E";
        ctx.font = "bold 42px 'Nunito', 'Microsoft JhengHei', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Puti-AI 直式除法解答卷", totalWidth / 2, padding + headerHeight / 2 - 15);

        ctx.fillStyle = "rgba(0, 0, 0, 0.03)";
        ctx.font = "30px Arial";
        ctx.textAlign = "right";
        for (let i = 0; i < totalHeight; i += 400) {
            ctx.fillText("©Puti-AI", totalWidth - 40, i + 150);
            ctx.fillText("©Puti-AI", 180, i + 350);
        }

        let currentY = padding + headerHeight;
        for (let r = 0; r < rows; r++) {
            let idx1 = r * cols;
            let idx2 = r * cols + 1;

            if (idx1 < canvases.length) {
                let cvs1 = canvases[idx1];
                let x1 = padding + (maxW - cvs1.width) / 2; 
                ctx.drawImage(cvs1, x1, currentY);
            }
            if (idx2 < canvases.length) {
                let cvs2 = canvases[idx2];
                let x2 = padding + maxW + gap + (maxW - cvs2.width) / 2; 
                ctx.drawImage(cvs2, x2, currentY);
            }
            currentY += rowHeights[r] + gap;
        }

        const link = document.createElement('a');
        link.download = `Puti_AI_解答卷_${new Date().getTime()}.png`;
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
    }
