<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puti-AI Z-Pen</title>
  <link rel="stylesheet" href="toolbar.css">
</head>
<body>
  <div class="toolbar" id="toolbar">
    <!-- Drag handle -->
    <div class="drag-handle" id="drag-handle" title="拖曳移動">
      <svg viewBox="0 0 24 6" width="20" height="6">
        <circle cx="4" cy="3" r="1.5" fill="currentColor"/>
        <circle cx="12" cy="3" r="1.5" fill="currentColor"/>
        <circle cx="20" cy="3" r="1.5" fill="currentColor"/>
      </svg>
    </div>

    <!-- Branding -->
    <div class="brand">
      <span class="brand-label">Puti-AI</span>
      <span class="brand-name">Z-Pen</span>
    </div>

    <!-- Zoom -->
    <button class="tool-btn" id="btn-zoom" title="放大 (Ctrl+1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>

    <!-- Draw -->
    <button class="tool-btn" id="btn-draw" title="畫筆 (Ctrl+2)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
      </svg>
    </button>

    <!-- Live Zoom -->
    <button class="tool-btn" id="btn-livezoom" title="即時放大 (Ctrl+4)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <path d="M11 8v6l3-3"/>
      </svg>
    </button>

    <!-- Separator -->
    <div class="separator"></div>

    <!-- Close -->
    <button class="tool-btn tool-btn--close" id="btn-close" title="關閉">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <script src="toolbar.js"></script>
</body>
</html>
