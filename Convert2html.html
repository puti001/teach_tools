<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puti-AI 程式碼轉HTML檔產生器</title>
    <!-- 引入 Tailwind CSS 進行快速樣式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 替換圖示 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800">

    <!-- 主要內容區塊 -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl flex flex-col">
        <!-- 標題與說明 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-indigo-700 flex items-center justify-center gap-3 mb-3">
                <i class="ph-fill ph-magic-wand text-4xl"></i>
                Puti-AI 程式碼轉HTML檔產生器 <span class="text-xl bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full ml-2">V2 智慧版</span>
            </h1>
            <p class="text-slate-600 text-lg max-w-3xl mx-auto">
                支援 <strong class="text-orange-500">一般 HTML</strong> 與 <strong class="text-blue-500">React (JSX)</strong> 語法。貼上由 AI 生成的原始程式碼，系統將自動為您轉換、防崩潰處理，一鍵下載即可在瀏覽器完美執行！
            </p>
        </header>

        <!-- 編輯區與操作區 -->
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-4 md:p-6 flex-grow flex flex-col">
            
            <!-- 偵測狀態顯示區 -->
            <div id="statusBadge" class="mb-3 flex items-center gap-2 text-sm font-bold text-slate-400 transition-colors">
                <i class="ph-bold ph-scan"></i> 正在等待輸入程式碼...
            </div>

            <!-- 程式碼輸入框 -->
            <div class="relative flex-grow flex flex-col group">
                <label for="codeInput" class="sr-only">請在此貼上程式碼</label>
                <textarea 
                    id="codeInput" 
                    class="w-full flex-grow min-h-[400px] p-5 bg-slate-900 text-green-400 font-mono text-sm md:text-base rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-300 resize-y shadow-inner leading-relaxed" 
                    placeholder="<!-- 請在此貼上您的 HTML 或 React 程式碼... -->&#10;&#10;例如：&#10;import React, { useState } from 'react';&#10;import { Users } from 'lucide-react'; // 外部模組會自動替換防崩潰&#10;export default function App() { ... }"
                    spellcheck="false"
                ></textarea>
                
                <!-- 清除按鈕 -->
                <button id="clearBtn" class="absolute top-4 right-4 bg-slate-700/80 hover:bg-slate-600 text-white p-2 px-3 rounded-lg transition-colors flex items-center gap-1.5 text-sm shadow backdrop-blur-sm" title="清除內容">
                    <i class="ph ph-trash"></i> 清除
                </button>
            </div>

            <!-- 操作按鈕區 -->
            <div class="mt-6 flex justify-center">
                <button 
                    id="downloadBtn" 
                    class="bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 active:scale-95 text-white font-bold py-4 px-8 md:px-12 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 flex items-center gap-2 text-lg"
                >
                    <i class="ph-bold ph-download-simple text-2xl"></i>
                    智慧打包並下載為 index.html
                </button>
            </div>
        </div>
    </main>

    <!-- 底部版權宣告區 -->
    <footer class="bg-slate-800 text-slate-300 py-8 mt-auto border-t-[6px] border-indigo-500">
        <div class="container mx-auto px-4 text-center leading-relaxed">
            <p class="mb-1">屏東縣後庄國小黃朝榮老師作品，免費分享，歡迎擴散推廣，</p>
            <p class="mb-3 text-red-300 font-medium">嚴禁商用與任何侵權、不尊重著作權的行為，</p>
            <a href="https://padlet.com/clongwh/puti_ai_tools" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 text-yellow-400 hover:text-yellow-300 font-bold text-lg hover:underline transition-colors bg-slate-700/50 px-5 py-2.5 rounded-full">
                <i class="ph-fill ph-link"></i> 更多 Puti-AI 教學工具 點此前往
            </a>
        </div>
    </footer>

    <!-- 提示訊息 (Toast) 容器 -->
    <div id="toastContainer" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const codeInput = document.getElementById('codeInput');
            const downloadBtn = document.getElementById('downloadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const toastContainer = document.getElementById('toastContainer');
            const statusBadge = document.getElementById('statusBadge');

            let currentMode = 'empty';

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                const baseClasses = "px-6 py-3 rounded-full shadow-lg font-bold text-white flex items-center gap-2 transform transition-all duration-300 translate-y-[-20px] opacity-0";
                const typeClasses = type === 'success' ? "bg-emerald-500" : (type === 'info' ? "bg-blue-500" : "bg-red-500");
                const icon = type === 'success' ? '<i class="ph-bold ph-check-circle text-xl"></i>' : (type === 'info' ? '<i class="ph-bold ph-info text-xl"></i>' : '<i class="ph-bold ph-warning-circle text-xl"></i>');

                toast.className = `${baseClasses} ${typeClasses}`;
                toast.innerHTML = `${icon} <span>${message}</span>`;
                toastContainer.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.remove('translate-y-[-20px]', 'opacity-0');
                    toast.classList.add('translate-y-0', 'opacity-100');
                });

                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-[-20px]', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            codeInput.addEventListener('input', () => {
                const code = codeInput.value;
                if (!code.trim()) {
                    currentMode = 'empty';
                    statusBadge.innerHTML = '<i class="ph-bold ph-scan"></i> 正在等待輸入程式碼...';
                    statusBadge.className = "mb-3 flex items-center gap-2 text-sm font-bold text-slate-400 transition-colors";
                    return;
                }

                if (code.includes('<!DOCTYPE html>') || code.toLowerCase().includes('<html')) {
                    if (currentMode !== 'html') {
                        currentMode = 'html';
                        statusBadge.innerHTML = '<i class="ph-bold ph-file-html text-orange-500 text-lg"></i> <span class="text-orange-600">偵測到一般 HTML 語法，將直接打包下載</span>';
                    }
                } else if (code.includes('import React') || code.includes('export default') || code.includes('useState') || code.includes('className=')) {
                    if (currentMode !== 'react') {
                        currentMode = 'react';
                        statusBadge.innerHTML = '<i class="ph-bold ph-atom text-blue-500 text-lg"></i> <span class="text-blue-600">偵測到 React 語法！已啟動防白畫面保護機制</span>';
                    }
                } else {
                    currentMode = 'unknown';
                    statusBadge.innerHTML = '<i class="ph-bold ph-question text-slate-500 text-lg"></i> <span class="text-slate-600">未知格式，將作為一般 HTML 處理</span>';
                }
            });

            clearBtn.addEventListener('click', () => {
                if(codeInput.value.trim() !== '') {
                    codeInput.value = '';
                    codeInput.dispatchEvent(new Event('input'));
                    showToast('內容已清除', 'success');
                }
            });

            function transformReactToHTML(code) {
                let newCode = code;

                // 1. 處理 React imports
                newCode = newCode.replace(/import\s+React\s*,\s*\{\s*(.*?)\s*\}\s*from\s*['"]react['"];?/g, 'const { $1 } = React;');
                newCode = newCode.replace(/import\s+\{\s*(.*?)\s*\}\s*from\s*['"]react['"];?/g, 'const { $1 } = React;');
                newCode = newCode.replace(/import\s+React\s*from\s*['"]react['"];?/g, '');

                // 2. 處理外部模組 import (如 lucide-react)，建立假元件避免 ReferenceError 白畫面
                // 處理解構引入: import { Clipboard, CheckCircle as MyCheck } from 'lucide-react';
                const importDestructuringRegex = /import\s+\{([^}]+)\}\s+from\s+['"](?!react)[^'"]+['"];?/g;
                newCode = newCode.replace(importDestructuringRegex, (match, varsString) => {
                    const vars = varsString.split(',').map(v => {
                        let name = v.trim();
                        if (name.includes(' as ')) {
                            name = name.split(' as ')[1].trim(); // 取別名
                        }
                        return name;
                    }).filter(v => v);
                    
                    // 將原本的紅色醜字替換成通用且尺寸可自適應的 SVG 佔位圖示
                    const stubs = vars.map(v => `const ${v} = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.3 }} title="缺少外部圖示: ${v}"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="12" cy="12" r="3"></circle></svg>;`).join('\n');
                    return `/* ${match} // Puti-AI 自動註解：替換為假元件防崩潰 */\n${stubs}`;
                });

                // 處理預設引入: import xxxx from 'yyyy';
                const importDefaultRegex = /import\s+([A-Za-z0-9_]+)\s+from\s+['"](?!react)[^'"]+['"];?/g;
                newCode = newCode.replace(importDefaultRegex, (match, defaultVar) => {
                    // 同樣替換為通用 SVG 佔位圖示
                    return `/* ${match} // Puti-AI 自動註解：替換為假元件防崩潰 */\nconst ${defaultVar} = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.3 }} title="缺少外部圖示: ${defaultVar}"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="12" cy="12" r="3"></circle></svg>;`;
                });

                // 3. 處理 export default
                let mainComponent = 'App';
                const exportMatch = newCode.match(/export\s+default\s+function\s+([A-Za-z0-9_]+)/) || newCode.match(/export\s+default\s+([A-Za-z0-9_]+)/);
                if (exportMatch) {
                    mainComponent = exportMatch[1];
                }
                newCode = newCode.replace(/export\s+default\s+function\s+([A-Za-z0-9_]+)/g, 'function $1');
                newCode = newCode.replace(/export\s+default\s+([A-Za-z0-9_]+);?/g, '');

                // 4. 自動掛載點
                if (!newCode.includes('ReactDOM.createRoot') && !newCode.includes('ReactDOM.render')) {
                    newCode += `\n\n// --- Puti-AI 自動掛載設定 ---\nconst root = ReactDOM.createRoot(document.getElementById('root'));\nroot.render(<${mainComponent} />);\n`;
                }

                // 5. 組裝成完整的 HTML 樣板 (包含錯誤捕捉面板)
                return `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puti-AI程式碼轉HTML檔產生器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"><\/script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"><\/script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
    <style>
        /* 錯誤捕捉面板樣式 */
        #puti-error-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; background: #fef2f2; color: #991b1b; padding: 20px; z-index: 9999; border-bottom: 4px solid #ef4444; font-family: monospace; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <!-- 錯誤捕捉面板 -->
    <div id="puti-error-overlay">
        <div class="flex items-center gap-2 mb-2 font-bold text-lg"><i class="ph-bold ph-warning"></i> 程式碼執行錯誤：</div>
        <div id="puti-error-msg" class="whitespace-pre-wrap text-sm break-all"></div>
        <div class="mt-3 text-xs opacity-70">提示：請檢查剛剛貼上的程式碼是否缺少括號，或有未定義的變數。</div>
    </div>

    <script>
        // 攔截執行階段錯誤，避免純白畫面
        window.addEventListener('error', function(e) {
            document.getElementById('puti-error-overlay').style.display = 'block';
            document.getElementById('puti-error-msg').innerText = e.message + '\\n(行數: ' + e.lineno + ', 欄位: ' + e.colno + ')';
        });
    <\/script>

    <!-- React 掛載點 -->
    <div id="root"></div>

    <!-- 您的程式碼 -->
    <script type="text/babel">
${newCode}
    <\/script>
</body>
</html>`;
            }

            downloadBtn.addEventListener('click', () => {
                const codeContent = codeInput.value;
                
                if (!codeContent.trim()) {
                    showToast('請先貼上程式碼！', 'error');
                    codeInput.classList.add('ring-4', 'ring-red-500');
                    setTimeout(() => codeInput.classList.remove('ring-4', 'ring-red-500'), 500);
                    codeInput.focus();
                    return;
                }

                try {
                    let finalHTML = codeContent;

                    if (currentMode === 'react') {
                        finalHTML = transformReactToHTML(codeContent);
                        showToast('已成功打包！外部模組已受防崩潰保護', 'info');
                    } else if (currentMode === 'unknown' && !finalHTML.includes('<html')) {
                        finalHTML = `<!DOCTYPE html>\n<html lang="zh-TW">\n<head>\n<meta charset="UTF-8">\n<script src="https://cdn.tailwindcss.com"><\/script>\n</head>\n<body class="p-4">\n${codeContent}\n</body>\n</html>`;
                        showToast('已補齊基本 HTML 架構並下載', 'success');
                    } else {
                        showToast('一般 HTML 檔案打包成功！', 'success');
                    }

                    const blob = new Blob([finalHTML], { type: 'text/html;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'index.html';
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 100);
                } catch (error) {
                    showToast('產生檔案時發生錯誤，請稍後再試。', 'error');
                    console.error("Download error:", error);
                }
            });
        });
    </script>
</body>
</html>
