                    {
                        lesson: "第 3 堂",
                        title: "因數與倍數",

                        shortDesc: "最大公因數、最小公倍數求法與生活應用。",
                        details: "<p><strong>🔹 複習重點：</strong>最大公因數與最小公倍數的求法與生活應用。常見考題包含判斷哪些數是某些數的公倍數，或是將物品平分裝箱、用巧拼墊鋪滿地板等應用題。</p><p><strong>🏆 拿分策略：</strong>熟練短除法，並學會從題目關鍵字（如「平分」、「最多」、「同時出發」）判斷該求因數還是倍數。</p>",

                    {
                        lesson: "第 4 堂",

                        emoji: "📐",
                        shortDesc: "圖形面積公式、內角和180度、邊長關係。",
                        details: "<p><strong>🔹 複習重點：</strong>三角形、平行四邊形與梯形的面積公式。必須熟記「三角形內角和為 180 度」以及「三角形任意兩邊之和大於第三邊」的幾何性質。</p><p><strong>🏆 拿分策略：</strong>圖形題經常會將圖形拆解或組合，只要把底和高找對（注意垂直符號），套用公式就能輕鬆得分。</p>",
                        prompt: "請生成 3 題五年級「平面圖形與角度」的視覺化文字題。包含：\n1. 複合圖形（三角形+梯形）的面積計算，且給定多餘的干擾邊長資訊以測試學生找「底和高」的能力。\n2. 應用「三角形內角和180度」與「兩邊之和大於第三邊」的觀念判斷題。\n請附上清晰的解題步驟。"

            {
                stageTitle: "第二階段：核心概念區 🎯",

                headerColor: "bg-amber-500",
                borderColor: "border-amber-500",
                iconColor: "text-amber-500",

                    {

                        details: "<p><strong>🔹 複習重點：</strong><br>1. 等值分數與擴分/約分。<br>2. <strong>小數除法的「餘數陷阱」</strong>：這是超級大熱門與易錯點！求商到特定小數位數時，餘數的小數點位置必須與「被除數原來的小數點」對齊（如 53÷7 求商到小數第二位，餘數的實際位值）。</p><p><strong>🏆 拿分策略：</strong>特別加強「小數除法有餘數」的直式計算，做完務必驗算：商×除數+餘數=被除數，確認餘數小數點是否正確。</p>",

                        details: "<p><strong>🔹 複習重點：</strong>正方體與長方體的體積及表面積計算。其中，<strong>「沉水體積（排開水的體積）」</strong>是極常出現的經典題型（如石頭放入水中，水面上升）。</p><p><strong>🏆 拿分策略：</strong>記住沉水物體體積的最快算法：<code>容器內部底面積 × 水面上升的高度</code>，不要去算總體積再相減，容易出錯。</p>",
                        prompt: "請設計 3 題五年級「容積與沉水體積」的應用題。其中兩題必須是經典的「石頭丟入長方體水槽，求石頭體積」的題型。解答請強調使用「容器內部底面積 × 水面上升高度」的高效算法，並提供引導學生理解此觀念的教學話術。"
                    }
                ]
            },
            {
                stageTitle: "第三階段：視覺直觀與生活應用區 👁️",
                stageDesc: "不需要複雜計算，憑藉觀念理解和視覺判斷即可得分。易學易懂。",
                headerColor: "bg-emerald-500",
                borderColor: "border-emerald-500",
                iconColor: "text-emerald-500",
                cards: [
                    {
                        lesson: "第 8 堂",
                        title: "線對稱圖形與扇形",
                        emoji: "🦋",
                        shortDesc: "判斷對稱軸數量、幾分之幾圓與圓心角換算。",
                        details: "<p><strong>🔹 複習重點：</strong><br>1. 線對稱：判斷常見圖形（長方形、正三角形、菱形等）有幾條對稱軸，或透過對稱求角度邊長。<br>2. 扇形：能算出幾分之幾圓對應的圓心角度數（如 1/6 圓的圓心角）。</p><p><strong>🏆 拿分策略：</strong>線對稱圖形可以用「想像對摺是否完全重合」來直觀判斷；扇形則緊扣「一個圓是 360 度」進行等比例換算。</p>",

                    },
                    {
                        lesson: "第 9 堂",
                        title: "時間與單位的換算",
                        emoji: "⏱️",
                        shortDesc: "跨日時間加減運算、重量與容量單位換算。",
                        details: "<p><strong>🔹 複習重點：</strong>時間的加減運算（跨日或時、分、秒換算）。基本重量與容量單位（公斤/公噸、公升/毫升）的換算也常融入計算中。</p><p><strong>🏆 拿分策略：</strong>時間計算切記進位與退位是「60 進制 或 24 進制」而非 10 進制，這是學生最常粗心的地方。畫時間線(數線)有助於跨日題型的思考。</p>",

                    }

            {
                stageTitle: "第四階段：實戰演練與錯題掃雷 💣",
                stageDesc: "確保前 9 堂課累積的實力順利轉化為實際分數。",
                headerColor: "bg-indigo-500",
                borderColor: "border-indigo-500",
                iconColor: "text-indigo-500",
                cards: [
                    {

        // --- 音效系統 (Web Audio API) ---
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playClickSound() {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function playSuccessSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // First note
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(523.25, now); // C5
            gain1.gain.setValueAtTime(0, now);
            gain1.gain.linearRampToValueAtTime(0.3, now + 0.05);
            gain1.gain.linearRampToValueAtTime(0, now + 0.15);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.15);

            // Second note
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(783.99, now + 0.1); // G5
            gain2.gain.setValueAtTime(0, now + 0.1);
            gain2.gain.linearRampToValueAtTime(0.3, now + 0.15);
            gain2.gain.linearRampToValueAtTime(0, now + 0.4);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(now + 0.1);
            osc2.stop(now + 0.4);
        }

        // --- 畫面渲染 ---
        const container = document.getElementById('course-container');
        
        function renderContent() {
            courseData.forEach((stage, stageIndex) => {
                // 建立階段標題區塊
                const stageSection = document.createElement('div');
                stageSection.className = 'mb-12';
                
                stageSection.innerHTML = `
                    <div class="border-b-2 ${stage.borderColor} pb-3 mb-6 flex flex-col md:flex-row md:items-end gap-3">
                        <h2 class="text-2xl font-black text-slate-800">${stage.stageTitle}</h2>
                        <p class="text-slate-500 font-medium pb-1">${stage.stageDesc}</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="stage-cards-${stageIndex}">
                    </div>
                `;
                container.appendChild(stageSection);

                const cardsContainer = document.getElementById(`stage-cards-${stageIndex}`);

                // 建立卡片
                stage.cards.forEach((card, cardIndex) => {
                    const cardEl = document.createElement('div');
                    cardEl.className = `bg-white rounded-xl p-6 border-t-4 ${stage.borderColor} card-hover shadow-md cursor-pointer relative overflow-hidden group`;
                    
                    // 隱藏的資料屬性，供點擊時使用
                    cardEl.dataset.lesson = card.lesson;
                    cardEl.dataset.title = card.title;
                    cardEl.dataset.emoji = card.emoji;
                    cardEl.dataset.details = card.details;
                    cardEl.dataset.prompt = card.prompt;
                    cardEl.dataset.color = stage.headerColor;

                    cardEl.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-bold text-white ${stage.headerColor} px-3 py-1 rounded-full shadow-sm">${card.lesson}</span>
                            <span class="text-3xl filter drop-shadow-sm transition-transform group-hover:scale-125 duration-300">${card.emoji}</span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-2 group-hover:${stage.iconColor} transition-colors">${card.title}</h3>
                        <p class="text-slate-600 text-sm mb-4 line-clamp-2">${card.shortDesc}</p>
                        <div class="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between text-sm font-bold ${stage.iconColor}">
                            <span>查看詳細重點與提示詞</span>
                            <span class="text-lg group-hover:translate-x-1 transition-transform">→</span>
                        </div>
                    `;

                    // 點擊事件：開啟 Modal
                    cardEl.addEventListener('click', () => {
                        initAudio();
                        playClickSound();
                        openModal(cardEl.dataset);
                    });

                    cardsContainer.appendChild(cardEl);
                });
            });
        }

        // --- Modal 控制 ---
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalCard = document.getElementById('modal-card');
        const modalHeader = document.getElementById('modal-header');
        const modalTitle = document.getElementById('modal-title');
        const modalDetails = document.getElementById('modal-details');
        const modalPrompt = document.getElementById('modal-prompt');
        const closeModalBtn = document.getElementById('close-modal');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        function openModal(data) {
            // 設定內容
            modalTitle.innerHTML = `<span class="text-2xl">${data.emoji}</span> ${data.lesson}：${data.title}`;
            modalDetails.innerHTML = data.details;
            modalPrompt.value = data.prompt;
            
            // 設定標題顏色
            modalHeader.className = `px-6 py-4 flex justify-between items-center text-white ${data.color}`;

            // 顯示動畫
            modalBackdrop.classList.remove('hidden');
            modalCard.classList.remove('modal-exit');
            modalCard.classList.add('modal-enter');
            document.body.style.overflow = 'hidden'; // 防止背景滾動
        }

        function closeModal() {
            modalCard.classList.remove('modal-enter');
            modalCard.classList.add('modal-exit');
            
            // 等待動畫結束再隱藏
            setTimeout(() => {
                modalBackdrop.classList.add('hidden');
                document.body.style.overflow = ''; 
            }, 200);
        }

        closeModalBtn.addEventListener('click', () => {
            playClickSound();
            closeModal();
        });
        
        modalBackdrop.addEventListener('click', (e) => {
            if (e.target === modalBackdrop) {
                closeModal();
            }
        });

        // --- 複製功能 ---
        copyBtn.addEventListener('click', () => {
            initAudio();
            modalPrompt.select();
            modalPrompt.setSelectionRange(0, 99999); // for mobile

            try {
                // 優先使用 clipboard API
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(modalPrompt.value).then(showToast);
                } else {
                    // Fallback
                    document.execCommand('copy');
                    showToast();
                }
            } catch (err) {
                console.error('複製失敗:', err);
                alert('複製失敗，請手動選取複製。');
            }
        });

        function showToast() {
            playSuccessSound();
            
            // 按鈕視覺回饋
            const originalHtml = copyBtn.innerHTML;
            copyBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>已複製！</span>`;
            copyBtn.classList.replace('bg-blue-600', 'bg-green-500');
            copyBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-600');
            
            // Toast 動畫
            toast.classList.remove('invisible');
            toast.classList.remove('toast-show');
            void toast.offsetWidth; // trigger reflow
            toast.classList.add('toast-show');

            setTimeout(() => {
                copyBtn.innerHTML = originalHtml;
                copyBtn.classList.replace('bg-green-500', 'bg-blue-600');
                copyBtn.classList.replace('hover:bg-green-600', 'hover:bg-blue-700');
            }, 2000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderContent();
            
            // 初始化音效 (綁定在第一次點擊任意處)
            document.body.addEventListener('click', initAudio, { once: true });
        });

    </script>
</body>
</html>
