    <title>Puti-AI ChatGPT Image 2.0 實用提示詞大庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f0f4fd 0%, #e0e8f8 100%);
            background-attachment: fixed;
        }
        /* 自訂捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.6);
        }
        
        /* Toast 動畫 */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
        .toast-animate {
            animation: slideUpFade 2.5s ease-in-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800">

                    { topic: "YouTube 縮圖", prompt: "請幫我設計一張資訊型 YouTube 縮圖，主題是 AI 提升工作效率，使用醒目的大字標題、強烈對比色與科技感背景，讓畫面在手機上也容易閱讀。" },

                    { topic: "教學資訊圖", prompt: "請幫我把 AI 工具使用方法做成教學型資訊圖，搭配流程箭頭與簡單 icon，適合社群分享。" },

                    { topic: "品牌社群模板", prompt: "請幫我設計一套品牌社群模板，包含公告、活動、引用語錄與新品發布版型，風格統一且容易套用。" }
                ]
            },
            {
                category: "二、工作應用類",

                    { topic: "商業簡報封面", prompt: "請幫我製作一張專業簡報封面，主題是新服務提案，使用簡潔排版、企業感配色與現代曲線設計，畫面像顧問公司或科技企業簡報。" },
                    { topic: "公司介紹圖卡", prompt: "請幫我製作一張公司介紹視覺，內容包含品牌理念、服務項目與核心特色，版面簡潔有專業感。" },
                    { topic: "產品比較表", prompt: "請幫我把不同方案做成視覺化比較表，使用簡潔欄位設計、圖示與重點標示，讓資訊更容易閱讀與理解。" },
                    { topic: "Q&A 問答圖卡", prompt: "請幫我設計一張 FAQ 問答卡片，把常見問題與回答整理成視覺化版面，讓內容更容易閱讀，適合品牌客服或網站使用。" },
                    { topic: "App Icon 設計", prompt: "請幫我設計一款現代感 App icon，以簡約幾何風格呈現，使用柔和綠色與白色配色，適合寵物養成類型 App，呈現多種功能，寫出設計概念，具有辨識度。" },

                    { topic: "讀書筆記風", prompt: "請將這張圖片或主題內容轉化為讀書筆記風。整體版面請像一本有質感的學習筆記頁，包含手寫感標題、重點底線、簡單框線、小箭頭、便利貼感區塊與清楚的段落分類。請讓內容看起來像真的有人閱讀後整理出的重點，而不是過度制式的簡報。文字排版請清楚、自然、有層次，適度保留留白。可以加入少量可愛小圖示、符號、標記或重點圈選，增加閱讀感與手作感。整體風格要有知識感、溫度感與收藏價值，像社群上會被存起來的讀書筆記頁。" },
                    { topic: "時間管理規劃圖", prompt: "請幫我把一天 24 小時做成時間分配圖，區分工作、學習、運動、娛樂與休息時間。使用時間軸與色塊設計，像 productivity app 的介面。" },
                    { topic: "美食插圖", prompt: "請幫我畫一張草莓鬆餅插畫，使用溫暖餐廳風格與細膩食物質感，擺盤乾淨精緻，看起來像餐廳菜單上的主視覺。" },
                    { topic: "日系白邊手繪風", prompt: "請觀察照片中出現的元素，並為每個元素加入有意義的手繪註解。\n\n【畫面中的物件】※請在此填入照片中的項目※\n\n【描寫規則】・使用像白色筆畫出的細手繪線條 ・線條要有一筆畫風格，隨性、略帶不均勻感 ・沿著物件外輪廓加上描邊 ・用箭頭或虛線引導視線\n\n【文字規則】・使用日文手寫字風格（平假名約 7 成，簡單漢字約 3 成） ・文字要短，像自言自語一樣的註解 ・語氣偏向「日記感、短句、情緒感」\n\n【評論生成規則】・飲料 → 描述味道、溫度、心情 ・食物 → 描述口感、美味程度 ・空間 → 描述氛圍 ・整體 → 用一句話總結\n\n【裝飾】・可低調加入蒸氣、閃亮、小愛心、小顏文字等元素 ・不要太多，保留適度留白\n\n【成品風格】・像 Instagram 限時動態風格，也像雜誌上的隨手筆記風 ・整體要有時髦感，同時帶點輕鬆不費力的氛圍。" },
                    { topic: "一週習慣追蹤表", prompt: "請幫我設計一張一週 habit tracker，包含運動、閱讀、喝水、冥想、早睡與學習等欄位。版面簡潔療癒，搭配小圖示與打勾區域，像文具品牌會推出的生活規劃模板。" },
                    { topic: "電影觀後感筆記", prompt: "請幫我製作一張電影觀後感卡片，內容包含電影評分、角色分析、經典台詞與心得。畫面帶有電影感與文青風格，像影評帳號分享圖卡。" }

        // Web Audio API 初始化 (用於播放點擊音效)
        let audioCtx = null;
        function playCopySound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 創建一組輕快的「叮叮」聲效
            const playTone = (freq, startTime, duration, type='sine') => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, startTime);
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.2, startTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };

            const now = audioCtx.currentTime;
            playTone(880, now, 0.15);       // 第一聲 (A5)
            playTone(1108.73, now + 0.1, 0.3); // 第二聲 (C#6)
        }

        // 顯示 Toast 動畫
        function showToast() {
            const toast = document.getElementById('toast-container');
            // 移除舊的動畫 class
            toast.classList.remove('toast-animate');
            // 觸發重繪 (reflow) 以便重新播放動畫
            void toast.offsetWidth; 
            
            toast.classList.remove('hidden');
            toast.classList.add('toast-animate');
            
            // 動畫結束後隱藏
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-animate');
            }, 2500);
        }

        // 複製到剪貼簿功能
        function copyText(text) {
            // 使用 execCommand 作為安全備案，確保在 iFrame 或特殊環境中能運作
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'absolute';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                playCopySound();
                showToast();
            } catch (err) {
                alert('複製失敗，請手動複製！');
            } finally {
                document.body.removeChild(textarea);
            }
        }

        // 渲染畫面
        const mainContainer = document.getElementById('main-container');

        promptsData.forEach((section, index) => {
            // 建立區塊標題
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'mb-16';
            
            const titleHtml = `
                <div class="flex items-center mb-8 border-b-2 border-gray-200 pb-2">
                    <span class="text-3xl mr-3">${section.icon}</span>
                    <h2 class="text-2xl font-bold text-gray-800">${section.category}</h2>
                </div>
            `;
            sectionDiv.innerHTML = titleHtml;

            // 建立卡片網格
            const gridDiv = document.createElement('div');
            gridDiv.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6';

            section.items.forEach(item => {
                const card = document.createElement('div');
                // 卡片外觀：圓角、陰影、毛玻璃、懸停上浮
                card.className = `group relative h-48 rounded-2xl overflow-hidden shadow-lg border border-white/40 bg-white/50 backdrop-blur-md cursor-pointer transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl`;
                
                // 卡片正面 (顯示主題)
                const front = document.createElement('div');
                front.className = `absolute inset-0 flex flex-col items-center justify-center p-4 transition-opacity duration-300 group-hover:opacity-0 bg-gradient-to-br from-white/80 to-white/30 z-10`;
                front.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br ${section.color} opacity-20 absolute top-[-10px] right-[-10px] blur-xl"></div>
                    <span class="text-3xl mb-3 drop-shadow-sm opacity-80">${section.icon}</span>
                    <h3 class="text-lg font-bold text-gray-800 text-center leading-tight tracking-wide drop-shadow-sm">${item.topic}</h3>
                `;

                // 卡片背面 (顯示提示詞)
                const back = document.createElement('div');
                back.className = `absolute inset-0 p-5 bg-gradient-to-br ${section.color} text-white opacity-0 transition-all duration-300 group-hover:opacity-100 flex flex-col z-20`;
                back.innerHTML = `
                    <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar text-sm font-medium leading-relaxed tracking-wide text-white/95 whitespace-pre-wrap">
                        ${item.prompt}
                    </div>

                // 綁定點擊事件
                card.onclick = () => copyText(item.prompt);

                card.appendChild(front);

            sectionDiv.appendChild(gridDiv);
            mainContainer.appendChild(sectionDiv);
