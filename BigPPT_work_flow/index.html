<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puti-AI 簡報工作流教學</title>
    
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 以便在瀏覽器中編譯 JSX (CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 定義所需的圖示 (取代原本的 lucide-react 以確保單一檔案獨立運行) ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const FileSpreadsheet = ({ className }) => <IconBase className={className}><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><path d="M8 11h8"/><path d="M8 15h8"/><path d="M11 11v8"/></IconBase>;
        const Presentation = ({ className }) => <IconBase className={className}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></IconBase>;
        const FileText = ({ className }) => <IconBase className={className}><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><line x1="9" x2="15" y1="9" y2="9"/><line x1="9" x2="15" y1="13" y2="13"/><line x1="9" x2="15" y1="17" y2="17"/></IconBase>;
        const Scissors = ({ className }) => <IconBase className={className}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" x2="8.12" y1="4" y2="15.88"/><line x1="14.47" x2="20" y1="14.48" y2="20"/><line x1="8.12" x2="12" y1="8.12" y2="12"/></IconBase>;
        const Cpu = ({ className }) => <IconBase className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" x2="15" y1="1" y2="1"/><line x1="9" x2="15" y1="23" y2="23"/><line x1="15" x2="15" y1="9" y2="15"/><line x1="9" x2="9" y1="9" y2="15"/><line x1="1" x2="1" y1="9" y2="15"/><line x1="23" x2="23" y1="9" y2="15"/></IconBase>;
        const Palette = ({ className }) => <IconBase className={className}><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></IconBase>;
        const ExternalLink = ({ className }) => <IconBase className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></IconBase>;
        const ChevronDown = ({ className }) => <IconBase className={className}><polyline points="6 9 12 15 18 9"/></IconBase>;
        const Info = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></IconBase>;

        // --- GiGi 圖示 ---
        const GiGiIcon = ({ className }) => (
            <svg viewBox="0 0 100 100" className={`${className} animate-float`} xmlns="http://www.w3.org/2000/svg">
                <style>
                    {`
                        @keyframes float-bot { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
                        .animate-float { animation: float-bot 3s ease-in-out infinite; }
                        @keyframes intermittent-glow { 0%, 80%, 100% { opacity: 0.8; filter: brightness(1); } 88% { opacity: 1; filter: brightness(1.4) drop-shadow(0 0 5px #22d3ee); } 92% { opacity: 1; filter: brightness(1.8) drop-shadow(0 0 8px #67e8f9); } 96% { opacity: 1; filter: brightness(1.4) drop-shadow(0 0 5px #22d3ee); } }
                        .animate-eye-glow { animation: intermittent-glow 4s ease-in-out infinite; }
                        @keyframes sparkle-eye { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
                        .animate-sparkle { animation: sparkle-eye 2s ease-in-out infinite; }
                        .animate-sparkle-delay { animation: sparkle-eye 2s ease-in-out infinite; animation-delay: 0.5s; }
                        @keyframes eye-visibility { 0%, 40% { opacity: 1; visibility: visible; } 41%, 95% { opacity: 0; visibility: hidden; } 96%, 100% { opacity: 1; visibility: visible; } }
                        .animate-eyes-toggle { animation: eye-visibility 10s infinite; }
                        @keyframes marquee-scroll { 0%, 40% { opacity: 0; transform: translateX(0px); } 41% { opacity: 1; transform: translateX(0px); } 95% { opacity: 1; transform: translateX(-100px); } 96%, 100% { opacity: 0; transform: translateX(-100px); } }
                        .animate-marquee-text { animation: marquee-scroll 10s linear infinite; }
                    `}
                </style>
                <defs>
                    <clipPath id="screenClip">
                        <rect x="25" y="41" width="50" height="26" rx="10" />
                    </clipPath>
                </defs>
                <path d="M 15 40 C 7 40 7 60 15 60 Z" fill="#94a3b8" />
                <path d="M 15 44 C 10 44 10 56 15 56 Z" fill="#06b6d4" />
                <path d="M 85 40 C 93 40 93 60 85 60 Z" fill="#94a3b8" />
                <path d="M 85 44 C 90 44 90 56 85 56 Z" fill="#06b6d4" />
                <rect x="15" y="25" width="70" height="50" rx="25" fill="#f59e0b" />
                <rect x="17" y="27" width="66" height="46" rx="23" fill="#fbbf24" />
                <text x="50" y="37" fontSize="6.5" fill="#78350f" textAnchor="middle" fontWeight="900" style={{fontFamily: 'sans-serif'}}>Puti-AI</text>
                <rect x="25" y="41" width="50" height="26" rx="10" fill="#0f172a" />
                <path d="M 28 47 L 31 47 L 31 43 M 72 58 L 69 58 L 69 54" stroke="#1e293b" strokeWidth="1" fill="none" />
                <g className="animate-eyes-toggle">
                    <circle cx="36" cy="54" r="8" fill="#0891b2" />
                    <circle cx="36" cy="54" r="6" fill="#22d3ee" className="animate-eye-glow" />
                    <circle cx="64" cy="54" r="8" fill="#0891b2" />
                    <circle cx="64" cy="54" r="6" fill="#22d3ee" className="animate-eye-glow" />
                    <g className="animate-sparkle" style={{transformOrigin: '36px 54px'}}>
                        <circle cx="33" cy="51" r="2.5" fill="#ffffff" />
                        <circle cx="38" cy="56" r="1" fill="#ffffff" />
                    </g>
                    <g className="animate-sparkle-delay" style={{transformOrigin: '64px 54px'}}>
                        <circle cx="61" cy="51" r="2.5" fill="#ffffff" />
                        <circle cx="66" cy="56" r="1" fill="#ffffff" />
                    </g>
                </g>
                <g clipPath="url(#screenClip)">
                    <text x="78" y="58" fontSize="7" fill="#22d3ee" fontWeight="bold" className="animate-marquee-text" style={{fontFamily: 'sans-serif, "Microsoft JhengHei"', filter: 'drop-shadow(0 0 2px #22d3ee)'}}>我是小吉，歡迎光臨</text>
                </g>
                <path d="M 46 71 Q 50 73 54 71" fill="none" stroke="#92400e" strokeWidth="2" strokeLinecap="round" />
            </svg>
        );

        // --- 主程式 ---
        const App = () => {
            const steps = [
                {
                    id: 1,
                    title: '建立圖文試算表',
                    icon: <FileSpreadsheet className="w-8 h-8 text-blue-500" />,
                    content: (
                        <ul className="list-disc pl-5 space-y-2 text-slate-700">
                        <li><strong>欄位規劃：</strong> 欄位必須遵守：投影片編號、標題、內文摘要、對應圖檔編號、圖檔位置(左半、中、右半)</li>
                        </ul>
                    ),
                    imageAlt: '',
                    imageTag: 'img_01'
                },
                {
                    id: 2,
                    title: '使用 Puti-AI 表格轉簡報產生器',
                    icon: <Presentation className="w-8 h-8 text-indigo-500" />,
                    content: (
                        <ul className="list-disc pl-5 space-y-2 text-slate-700">
                        <li><strong>功能：</strong> 自動將試算表資料「瞬移」進 PPT 範本中。</li>
                        </ul>
                    ),
                    link: 'https://puti001.github.io/teach_tools/Table2PPT.html',
                    linkText: '開啟表格轉簡報產生器',
                    imageAlt: '',
                    imageTag: 'img_02'
                },
                {
                    id: 3,
                    title: '由 PPT 匯出 PDF',
                    icon: <FileText className="w-8 h-8 text-red-500" />,
                    content: (
                        <ul className="list-disc pl-5 space-y-2 text-slate-700">
                        <li><strong>動作：</strong> 將生成的 PPT 直接另存成一個 PDF 大檔案。</li>
                        </ul>
                    ),
                    imageAlt: '',
                    imageTag: 'img_03'
                },
                {
                    id: 4,
                    title: 'Puti-AI PDF 拆分處理',
                    icon: <Scissors className="w-8 h-8 text-amber-500" />,
                    content: (
                        <ul className="list-disc pl-5 space-y-2 text-slate-700">
                        <li><strong>策略：</strong> 將一個 PDF 大檔案，每份 15 張拆成一小份。</li>
                        </ul>
                    ),
                    link: 'https://puti001.github.io/teach_tools/PDF_splitter.html',
                    linkText: '開啟 PDF 拆分器',
                    imageAlt: '',
                    imageTag: 'img_04'
                },
                {
                    id: 5,
                    title: '匯入【若普克】作業系統 (可用你自己的 NotebookLM)',
                    icon: <Cpu className="w-8 h-8 text-emerald-500" />,
                    content: (
                        <ul className="list-disc pl-5 space-y-2 text-slate-700">
                        <li><strong>操作：</strong> 將拆好的 PDF 匯入NotebookLM筆記本，進行「同風格簡報」平行處理，下載數個同風格PDF(記得更名+順序流水號)。</li>
                        </ul>
                    ),
                    link: 'https://notebooklm.google.com/notebook/a637108a-690b-4c3e-a7ae-2a0d94950a03',
                    linkText: '前往【若普克】作業系統',
                    imageAlt: '',
                    imageTag: 'img_05'
                },
                {
                    id: 6,
                    title: '匯入 Canva 進行組合編輯',
                    icon: <Palette className="w-8 h-8 text-purple-500" />,
                    content: (
                        <ul className="list-disc pl-5 space-y-2 text-slate-700">
                        <li><strong>最後美化：</strong> 將每個匯入 Canva，做修改和組合。</li>
                        </ul>
                    ),
                    imageAlt: '',
                    imageTag: 'img_06'
                }
            ];

            return (
                <div className="min-h-screen pb-12">
                {/* 頁首 Header */}
                <header className="bg-gradient-to-r from-blue-800 to-indigo-900 text-white py-12 px-6 shadow-md relative overflow-hidden">
                    <div className="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-white opacity-5 blur-2xl"></div>
                    <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-blue-400 opacity-10 blur-3xl"></div>
                    
                    <div className="max-w-4xl mx-auto relative z-10 text-center">
                    <div className="inline-block bg-white/20 backdrop-blur-sm p-3 rounded-2xl mb-4 border border-white/30">
                        <GiGiIcon className="w-14 h-14" />
                    </div>
                    <h1 className="text-3xl md:text-5xl font-black tracking-tight mb-4 drop-shadow-sm">
                        Puti-AI 快速生成風格一致性簡報工作流
                    </h1>
                    <p className="text-blue-100 text-lg md:text-xl font-medium max-w-2xl mx-auto drop-shadow-sm">
                        免寫 GAS！透過自動化工具組合，輕鬆完成 150 張風格一致的大型簡報。
                    </p>
                    </div>
                </header>

                {/* Puti老師的提示 */}
                <div className="max-w-4xl mx-auto -mt-6 px-4 relative z-20">
                    <div className="bg-white rounded-2xl p-6 shadow-lg border border-slate-100 flex flex-col md:flex-row items-center gap-6">
                    <div className="flex-shrink-0 relative">
                        <div className="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center text-3xl overflow-hidden border-4 border-white shadow-sm">
                        👨‍🏫
                        </div>
                        <div className="absolute -bottom-2 -right-2 w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-xl border-2 border-white shadow-sm">
                        🤖
                        </div>
                    </div>
                    <div>
                        <h3 className="text-lg font-bold text-slate-800 mb-1 flex items-center gap-2">
                        <Info className="w-5 h-5 text-amber-500" /> Puti 老師叮嚀：
                        </h3>
                        <p className="text-slate-600 leading-relaxed">
                        這套方法的精髓在於<strong>「先拆後合」</strong>。按照以下 6 個步驟，配合專屬的 Puti-AI 工具，大批量簡報也能快速、精準地完成。
                        </p>
                    </div>
                    </div>
                </div>

                {/* 主要內容區域：教學步驟 */}
                <main className="max-w-4xl mx-auto mt-12 px-4 space-y-12">
                    {steps.map((step, index) => (
                    <section key={step.id} className="relative">
                        {/* 連接線 */}
                        {index !== steps.length - 1 && (
                        <div className="hidden md:block absolute left-12 top-24 bottom-[-3rem] w-1 bg-gradient-to-b from-blue-200 to-transparent z-0"></div>
                        )}
                        
                        <div className="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 relative z-10 flex flex-col md:flex-row gap-8 hover:shadow-md transition-shadow">
                        
                        {/* 步驟標籤與圖示 */}
                        <div className="md:w-1/3 flex flex-col items-center md:items-start">
                            <div className="flex items-center gap-4 mb-4">
                            <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center shadow-md text-2xl font-black text-white">
                                0{step.id}
                            </div>
                            <div className="bg-blue-50 p-3 rounded-2xl">
                                {step.icon}
                            </div>
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 text-center md:text-left mb-2">
                            {step.title}
                            </h2>
                            
                            {/* 連結按鈕 */}
                            {step.link && (
                            <a 
                                href={step.link} 
                                target="_blank" 
                                rel="noreferrer"
                                className="mt-4 inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-colors w-full justify-center md:justify-start"
                            >
                                <ExternalLink className="w-4 h-4" /> {step.linkText}
                            </a>
                            )}
                        </div>

                        {/* 步驟內容與圖片佔位 */}
                        <div className="md:w-2/3 flex flex-col justify-center">
                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-4">
                            {step.content}
                            </div>
                            
                            {/* 圖片佔位區與自動載入機制 */}
                            {step.imageTag && (
                            <div className="relative w-full h-48 md:h-64 bg-slate-100 border-2 border-dashed border-slate-300 rounded-2xl flex flex-col items-center justify-center text-slate-400 group hover:bg-slate-50 transition-colors overflow-hidden">
                                
                                {/* 自動抓取圖片 fallback: png -> jpg -> jpeg -> gif */}
                                <img 
                                src={`./${step.imageTag}.png`} 
                                alt={step.title}
                                className="absolute inset-0 w-full h-full object-contain bg-white z-10"
                                onError={(e) => {
                                    const currentSrc = e.target.src;
                                    if (currentSrc.includes('.png')) {
                                    e.target.src = `./${step.imageTag}.jpg`;
                                    } else if (currentSrc.includes('.jpg')) {
                                    e.target.src = `./${step.imageTag}.jpeg`;
                                    } else if (currentSrc.includes('.jpeg')) {
                                    e.target.src = `./${step.imageTag}.gif`;
                                    } else {
                                    e.target.style.display = 'none';
                                    }
                                }}
                                />

                                <div className="relative z-0 flex flex-col items-center text-center p-4">
                                <p className="text-sm font-medium">{step.imageAlt || '尚未載入圖片'}</p>
                                <span className="mt-2 px-3 py-1 bg-slate-200 text-slate-600 rounded-full text-xs font-mono">
                                    {`請準備 ${step.imageTag}.png 或 .jpg`}
                                </span>
                                </div>
                                
                                <div className="absolute bottom-2 right-2 opacity-50 text-[10px] font-mono z-20 mix-blend-multiply">
                                ©Puti-AI
                                </div>
                            </div>
                            )}
                        </div>

                        </div>
                    </section>
                    ))}
                    
                    {/* 結束指標 */}
                    <div className="flex justify-center mt-8 text-blue-300">
                    <ChevronDown className="w-8 h-8 animate-bounce" />
                    </div>
                </main>

                {/* 頁尾 Footer */}
                <footer className="bg-slate-900 text-slate-400 py-10 mt-12 px-6 text-center">
                    <div className="max-w-4xl mx-auto">
                    <p className="mb-4 text-sm md:text-base text-slate-300 font-medium">
                        屏東縣後庄國小黃朝榮老師作品，免費分享，歡迎擴散推廣，嚴禁商用與任何侵權、不尊重著作權的行為，更多 Puti-AI 教學工具 <a href="https://padlet.com/clongwh/puti_ai_tools" target="_blank" rel="noreferrer" className="text-blue-400 hover:text-blue-300 underline underline-offset-4 font-bold">點此前往</a>。
                    </p>
                    </div>
                </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
